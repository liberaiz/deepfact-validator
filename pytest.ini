[pytest]
# DeepFact Validator — pytest config (v1.1.5).
#
# asyncio_mode=auto ensures @pytest.mark.asyncio tests are collected and run
# without manual fixture wiring. Used by tests/test_injection_defense.py.
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
