<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 880" font-family="'Inter', 'Hiragino Sans', 'Yu Gothic', sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F8F6F1"/>
    </linearGradient>
    <linearGradient id="inkGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1B2A4E"/>
      <stop offset="100%" stop-color="#15223F"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C9A55C"/>
      <stop offset="100%" stop-color="#A38440"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e6e3a"/>
      <stop offset="100%" stop-color="#0a5530"/>
    </linearGradient>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#A38440"/>
    </marker>
    <marker id="arrowInk" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1B2A4E"/>
    </marker>
  </defs>

  <rect width="1200" height="880" fill="url(#bgGrad)"/>

  <!-- Header -->
  <text x="60" y="55" font-size="13" fill="#A38440" letter-spacing="3" font-family="'JetBrains Mono', monospace">DEEPFACT VALIDATOR · ARCHITECTURE v0.3 · 2026-06-20</text>
  <text x="60" y="100" font-size="32" fill="#1B2A4E" font-weight="700" font-family="'Shippori Mincho', 'Yu Mincho', serif">マルチエージェント × Vertex AI 構成</text>
  <line x1="60" y1="120" x2="1140" y2="120" stroke="#1B2A4E" stroke-width="2"/>

  <!-- ENTRY LAYER -->
  <text x="60" y="160" font-size="11" fill="#8a6f33" letter-spacing="2" font-weight="700" font-family="'JetBrains Mono', monospace">ENTRY</text>
  <g filter="url(#cardShadow)">
    <rect x="60" y="170" width="320" height="80" rx="4" fill="#FFFFFF" stroke="#1B2A4E" stroke-width="1"/>
    <text x="80" y="200" font-size="14" font-weight="700" fill="#1B2A4E">LINE Bot</text>
    <text x="80" y="220" font-size="12" fill="#1B2A4E" opacity="0.75">Messaging API · 友達追加だけで誰でも利用</text>
    <text x="80" y="238" font-size="11" fill="#A38440" font-family="'JetBrains Mono', monospace">/webhook/line</text>
  </g>
  <g filter="url(#cardShadow)">
    <rect x="440" y="170" width="320" height="80" rx="4" fill="#FFFFFF" stroke="#1B2A4E" stroke-width="1"/>
    <text x="460" y="200" font-size="14" font-weight="700" fill="#1B2A4E">Chrome Extension</text>
    <text x="460" y="220" font-size="12" fill="#1B2A4E" opacity="0.75">Manifest V3 · リアルタイム能動介入</text>
    <text x="460" y="238" font-size="11" fill="#A38440" font-family="'JetBrains Mono', monospace">/api/analyze (input_type=dom)</text>
  </g>
  <g filter="url(#cardShadow)">
    <rect x="820" y="170" width="320" height="80" rx="4" fill="#FFFFFF" stroke="#1B2A4E" stroke-width="1"/>
    <text x="840" y="200" font-size="14" font-weight="700" fill="#1B2A4E">HTTP API</text>
    <text x="840" y="220" font-size="12" fill="#1B2A4E" opacity="0.75">外部システム連携・社内ツール接続</text>
    <text x="840" y="238" font-size="11" fill="#A38440" font-family="'JetBrains Mono', monospace">/api/analyze (input_type=url|text)</text>
  </g>

  <!-- arrows to RUNTIME -->
  <line x1="220" y1="250" x2="540" y2="295" stroke="#A38440" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="600" y1="250" x2="600" y2="295" stroke="#A38440" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="980" y1="250" x2="660" y2="295" stroke="#A38440" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- RUNTIME LAYER -->
  <text x="60" y="320" font-size="11" fill="#8a6f33" letter-spacing="2" font-weight="700" font-family="'JetBrains Mono', monospace">RUNTIME · DETERMINISTIC</text>
  <g filter="url(#cardShadow)">
    <rect x="60" y="330" width="1080" height="100" rx="4" fill="url(#inkGrad)"/>
    <text x="85" y="360" font-size="16" font-weight="700" fill="#F8F6F1">Cloud Run + FastAPI (asia-northeast1)</text>
    <text x="85" y="382" font-size="12" fill="#C9A55C" font-family="'JetBrains Mono', monospace">rev deepfact-validator-00008+ · min-instances=1 · max=10 · Secret Manager 連携</text>
    <text x="85" y="408" font-size="12" fill="#F8F6F1">完全決定化: </text>
    <text x="168" y="408" font-size="12" fill="#C9A55C" font-family="'JetBrains Mono', monospace">temperature=0.0 + seed=42 + top_k=1 + response_mime_type=application/json</text>
  </g>

  <!-- arrow to AGENTS -->
  <line x1="600" y1="430" x2="600" y2="465" stroke="#1B2A4E" stroke-width="2" marker-end="url(#arrowInk)"/>

  <!-- AGENTS LAYER -->
  <text x="60" y="480" font-size="11" fill="#8a6f33" letter-spacing="2" font-weight="700" font-family="'JetBrains Mono', monospace">MULTI-AGENT PIPELINE</text>
  <g filter="url(#cardShadow)">
    <rect x="60" y="490" width="340" height="130" rx="4" fill="#FFFFFF" stroke="#A38440" stroke-width="2"/>
    <text x="80" y="518" font-size="13" font-weight="700" fill="#A38440" font-family="'JetBrains Mono', monospace">AGENT 1</text>
    <text x="80" y="540" font-size="16" font-weight="700" fill="#1B2A4E">Watcher</text>
    <text x="80" y="565" font-size="12" fill="#1B2A4E" opacity="0.85">入力 → 記事タイトル・要約・主張</text>
    <text x="80" y="582" font-size="12" fill="#1B2A4E" opacity="0.85">感情強度・出典 URL を構造抽出</text>
    <text x="80" y="605" font-size="11" fill="#A38440" font-family="'JetBrains Mono', monospace">via Vertex AI Gemini 2.5-flash</text>
  </g>
  <g filter="url(#cardShadow)">
    <rect x="430" y="490" width="340" height="130" rx="4" fill="#FFFFFF" stroke="#A38440" stroke-width="2"/>
    <text x="450" y="518" font-size="13" font-weight="700" fill="#A38440" font-family="'JetBrains Mono', monospace">AGENT 2</text>
    <text x="450" y="540" font-size="16" font-weight="700" fill="#1B2A4E">Investigator</text>
    <text x="450" y="565" font-size="12" fill="#1B2A4E" opacity="0.85">信頼ソース辞書 30+ ドメイン照合</text>
    <text x="450" y="582" font-size="12" fill="#1B2A4E" opacity="0.85">論調バイアス・事実整合性 0-1 判定</text>
    <text x="450" y="605" font-size="11" fill="#A38440" font-family="'JetBrains Mono', monospace">+ 対立見解・要警戒構造 検出</text>
  </g>
  <g filter="url(#cardShadow)">
    <rect x="800" y="490" width="340" height="130" rx="4" fill="#FFFFFF" stroke="#A38440" stroke-width="2"/>
    <text x="820" y="518" font-size="13" font-weight="700" fill="#A38440" font-family="'JetBrains Mono', monospace">AGENT 3</text>
    <text x="820" y="540" font-size="16" font-weight="700" fill="#1B2A4E">Validator</text>
    <text x="820" y="565" font-size="12" fill="#1B2A4E" opacity="0.85">数値統合（重み付き加算）</text>
    <text x="820" y="582" font-size="12" fill="#1B2A4E" opacity="0.85">自然言語の構造観察レポート生成</text>
    <text x="820" y="605" font-size="11" fill="#A38440" font-family="'JetBrains Mono', monospace">人ではなく構造を見る原則</text>
  </g>

  <!-- agent arrows -->
  <line x1="400" y1="555" x2="430" y2="555" stroke="#A38440" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="770" y1="555" x2="800" y2="555" stroke="#A38440" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- arrow to DATA -->
  <line x1="600" y1="620" x2="600" y2="655" stroke="#1B2A4E" stroke-width="2" marker-end="url(#arrowInk)"/>

  <!-- DATA LAYER -->
  <text x="60" y="670" font-size="11" fill="#8a6f33" letter-spacing="2" font-weight="700" font-family="'JetBrains Mono', monospace">DATA · OBSERVABILITY</text>
  <g filter="url(#cardShadow)">
    <rect x="60" y="680" width="520" height="90" rx="4" fill="#FFFFFF" stroke="#1B2A4E" stroke-width="1"/>
    <text x="80" y="710" font-size="14" font-weight="700" fill="#1B2A4E">Firestore + Vertex AI Embedding</text>
    <text x="80" y="732" font-size="12" fill="#1B2A4E" opacity="0.75">信頼ソース辞書 / 記事 embedding / 警告履歴</text>
    <text x="80" y="750" font-size="12" fill="#1B2A4E" opacity="0.75">cosine similarity（Phase 3 で VSX index 移行予定）</text>
  </g>
  <g filter="url(#cardShadow)">
    <rect x="620" y="680" width="520" height="90" rx="4" fill="url(#greenGrad)"/>
    <text x="640" y="710" font-size="14" font-weight="700" fill="#FFFFFF">Cloud Logging + Monitoring</text>
    <text x="640" y="732" font-size="12" fill="#F4E4A8">情報の Observability ＝ SRE 流 警告履歴蓄積</text>
    <text x="640" y="750" font-size="12" fill="#F4E4A8">severity INFO / WARN / CRITICAL · 24h Postmortem</text>
  </g>

  <!-- KEY METRICS callout -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="800" width="1080" height="60" rx="4" fill="url(#inkGrad)"/>
    <text x="80" y="828" font-size="11" fill="#C9A55C" letter-spacing="2" font-weight="700" font-family="'JetBrains Mono', monospace">KEY METRICS (v0.3 機械検証)</text>
    <text x="80" y="850" font-size="14" fill="#F8F6F1">
      <tspan font-weight="700" fill="#C9A55C">78pt</tspan> 信頼度振れ幅（98% vs 20% / 6 パターン）　·
      <tspan font-weight="700" fill="#C9A55C">100%</tspan> 同一入力×3 回完全一致　·
      <tspan font-weight="700" fill="#C9A55C">117ms</tspan> /health 応答　·
      <tspan font-weight="700" fill="#C9A55C">Free Tier 制約 解消</tspan>（Vertex AI billing 経由）
    </text>
  </g>
</svg>
