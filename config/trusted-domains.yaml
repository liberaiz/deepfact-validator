# DeepFact Validator — 信頼ソース辞書
# Source of truth for source-credibility scoring. Loaded at app start by investigator_agent.
# Schema validated by scripts/validate-trust-sources.py in CI (PR + main push).
#
# Editing rules:
#   - credibility ∈ [0.0, 1.0]
#   - category must be one of the enum below
#   - domain must be unique
#   - For sub-domain matching, register the registrable root (e.g. "nature.com" matches "www.nature.com")
version: "1.0"
last_updated: "2026-06-29"
# Known categories (enum, validated):
