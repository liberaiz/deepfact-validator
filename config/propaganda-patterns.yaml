# DeepFact Validator — 煽動・陰謀論パターン辞書
# Source of truth for propaganda-intensity scoring. Loaded at app start by watcher_agent.
# Schema validated by scripts/validate-trust-sources.py in CI (PR + main push).
#
# weights ∈ [0.0, 1.0]; one category may include both ja and en terms.
version: "1.0"
last_updated: "2026-06-29"

# Per-category multiplier applied in detect_propaganda().
weights:
  high_alert: 0.30
  evidence_lack: 0.40
  urgency: 0.25
  medical_fraud: 0.35
  conspiracy: 0.30

# Term lists. Substring case-insensitive match.
